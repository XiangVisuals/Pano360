<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, minimal-ui">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="沉浸全景">
    
    <title>沉浸式全景体验 | 视觉漫游</title>
    
    <!-- 引入高级无衬线字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <!-- 仅引入最基础的稳定版 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4);
            --glass-bg: rgba(5, 5, 5, 0.65);
            --glass-border: rgba(255, 255, 255, 0.15);
            --transition-smooth: 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-fast: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh; height: 100dvh; 
            overflow: hidden; background-color: var(--bg-color);
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent; color: var(--text-main);
            letter-spacing: 1px;
        }

        /* 原生 WebGL 容器 */
        #webgl-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        /* 场景过渡黑幕 */
        #scene-transition {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 5; opacity: 1; transition: opacity 1.5s ease-in-out;
            pointer-events: none;
        }

        /* --- 极简启动页 --- */
        #landing-page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100dvh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 1.2s ease, backdrop-filter 1.2s ease;
            background: rgba(0,0,0,0.3); /* 压暗整体背景 */
        }
        .landing-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: blur(40px) brightness(0.3) grayscale(50%);
            transform: scale(1.1); z-index: -1; transition: opacity 1s ease-in-out; 
        }
        .landing-content {
            display: flex; flex-direction: column; align-items: center;
            transform: translateY(15px); opacity: 0;
            animation: contentFadeIn 2s var(--transition-smooth) forwards;
            animation-delay: 0.2s; width: 100%; max-width: 1200px;
        }
        @keyframes contentFadeIn { to { transform: translateY(0); opacity: 1; } }

        h1 { font-size: 32px; font-weight: 200; margin: 0 0 8px 0; letter-spacing: 8px; text-transform: uppercase; text-align: center;}
        p.subtitle { font-size: 11px; font-weight: 300; color: var(--text-muted); margin-bottom: 40px; letter-spacing: 4px; text-transform: uppercase; text-align: center;}

        /* 画廊 (全新换行网格布局 + 垂直滚动) */
        .landing-gallery-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 0; }
        
        .landing-gallery {
            display: flex; 
            flex-wrap: wrap; /* 允许换行 */
            gap: 20px; 
            width: 100%; 
            max-width: 1050px; 
            max-height: 50vh; /* 限制最大高度，防止溢出屏幕 */
            padding: 20px; 
            box-sizing: border-box;
            overflow-y: auto; /* 超出则垂直滚动 */
            overflow-x: hidden;
            justify-content: center;
            align-content: flex-start; /* 多行内容靠上对齐 */
        }
        
        /* 极简高级垂直滚动条 */
        .landing-gallery::-webkit-scrollbar {
            width: 4px;
            display: block; /* 唤出滚动条 */
        }
        .landing-gallery::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }
        .landing-gallery::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        .landing-gallery::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        @media (max-width: 900px) {
            h1 { font-size: 24px; letter-spacing: 6px; }
            .landing-gallery { max-height: 55vh; padding: 15px; }
        }
        
        .thumb-item {
            flex: 0 0 240px; height: 135px; border-radius: 0; /* 锋利直角 */
            overflow: hidden; position: relative; cursor: pointer; 
            transition: var(--transition-smooth); 
            opacity: 0.4; filter: grayscale(100%);
            border: 1px solid transparent; box-sizing: border-box;
        }
        @media (max-width: 600px) {
            /* 手机端适当缩放以在一排显示两个 */
            .thumb-item { flex: 0 0 150px; height: 85px; }
        }

        .thumb-item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; transition: var(--transition-smooth); }
        .thumb-item:hover { opacity: 0.7; filter: grayscale(50%); }
        .thumb-item.active { 
            opacity: 1; filter: grayscale(0%); 
            border: 1px solid rgba(255,255,255,0.7); /* 极简白框 */
        }
        /* 缓慢缩放图片内容，而不是外框跳动 */
        .thumb-item.active img { transform: scale(1.05); }

        .thumb-item .item-title {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 12px 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            text-align: center; font-size: 10px; font-weight: 300; letter-spacing: 3px; 
            text-transform: uppercase; opacity: 0; transition: var(--transition-fast);
        }
        .thumb-item.active .item-title { opacity: 1; }

        .start-btn {
            margin-top: 30px; background: transparent; border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 0 50px; height: 46px; font-size: 11px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase;
            border-radius: 0; /* 锋利直角 */
            cursor: pointer; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: inline-flex; align-items: center; justify-content: center; gap: 12px; transition: var(--transition-fast);
            flex-shrink: 0;
        }
        .start-btn:hover { background: #fff; color: #000; border-color: #fff; }
        .start-btn:active { opacity: 0.7; }

        /* HUD 控制栏 */
        #hud-controls {
            position: absolute; bottom: max(30px, env(safe-area-inset-bottom) + 15px);
            left: 50%; transform: translateX(-50%) translateY(100px);
            display: flex; gap: 8px; padding: 6px 12px;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 0; /* 锋利直角 */
            z-index: 20; transition: var(--transition-smooth); opacity: 0; pointer-events: none;
        }
        #hud-controls.visible { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
        #hud-controls.idle { opacity: 0; transform: translateX(-50%) translateY(20px); pointer-events: none; }
        
        /* 交互区域检测以取消隐藏 */
        #interaction-layer { position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 10; }

        .hud-btn {
            width: 36px; height: 36px; border-radius: 0; background: transparent; border: none;
            color: var(--text-main); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition-fast); opacity: 0.6;
        }
        .hud-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.2; }
        .hud-btn:hover { opacity: 1; background: rgba(255,255,255,0.1); }
        .hud-btn.active { opacity: 1; color: #000; background: #fff; }
        .hud-btn.active svg { stroke: #000; }
        .divider { width: 1px; height: 18px; background: var(--glass-border); margin: auto 5px; }

        /* 画廊面板 (VR内部小图依然保持水平滚动) */
        #gallery-panel {
            position: absolute; bottom: max(80px, env(safe-area-inset-bottom) + 65px);
            left: 50%; transform: translateX(-50%) translateY(20px);
            width: max-content; max-width: 90vw; opacity: 0; pointer-events: none;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 0;
            transition: var(--transition-fast); z-index: 15; padding: 12px; display: flex; gap: 12px; overflow-x: auto;
        }
        #gallery-panel.open { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
        #gallery-panel::-webkit-scrollbar { display: none; }

        .hud-scene-item {
            width: 100px; height: 56px; border-radius: 0; overflow: hidden; position: relative;
            cursor: pointer; filter: grayscale(100%); opacity: 0.5; transition: var(--transition-fast); flex-shrink: 0;
            border: 1px solid transparent; box-sizing: border-box;
        }
        .hud-scene-item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; transition: var(--transition-smooth); }
        .hud-scene-item.active, .hud-scene-item:hover { filter: grayscale(0%); opacity: 1; }
        .hud-scene-item.active { border: 1px solid rgba(255,255,255,0.5); }
        .hud-scene-item.active img { transform: scale(1.1); }
        .hud-scene-item .title {
            position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9));
            font-size: 9px; font-weight: 300; letter-spacing: 1px; text-align: center; padding: 4px 0; pointer-events: none;
            text-transform: uppercase;
        }

        /* 优雅的 Loading */
        .loader-wrapper {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 50; flex-direction: column; align-items: center; gap: 20px;
        }
        .line-spinner { width: 60px; height: 1px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        .line-spinner::after {
            content: ''; position: absolute; top: 0; left: -50%; width: 50%; height: 100%;
            background: #fff; animation: lineLoad 1.5s infinite ease-in-out;
        }
        @keyframes lineLoad { 0% { left: -50%; } 100% { left: 100%; } }

        /* 高级 Toast */
        #toast-msg {
            position: absolute; top: max(40px, env(safe-area-inset-top) + 20px); left: 50%;
            transform: translateX(-50%) translateY(-20px); color: #fff; font-size: 10px; font-weight: 300; letter-spacing: 4px;
            text-transform: uppercase; opacity: 0; transition: var(--transition-smooth);
            z-index: 200; pointer-events: none; 
        }
        #toast-msg.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        
        .progress-text { font-size: 9px; font-weight: 300; color: rgba(255,255,255,0.6); letter-spacing: 2px; font-variant-numeric: tabular-nums;}

    </style>
</head>
<body>

    <!-- 原生 WebGL 容器 -->
    <div id="webgl-container"></div>
    <div id="scene-transition"></div>
    
    <!-- 专门用于捕获手势交互的透明层 -->
    <div id="interaction-layer"></div>

    <div id="landing-page">
        <div class="landing-bg" id="landing-bg"></div>
        <div class="landing-content">
            <h1>Visuals Space</h1>
            <p class="subtitle">Immersive 3D Experience</p>
            
            <div class="landing-gallery-wrapper">
                <div class="landing-gallery" id="landing-gallery"></div>
                <button class="start-btn" id="startBtn">
                    Enter
                </button>
            </div>
        </div>
    </div>
    
    <div class="loader-wrapper" id="loader">
        <div class="line-spinner"></div>
        <div style="font-size:9px; font-weight:300; color:rgba(255,255,255,0.4); letter-spacing:4px; text-transform:uppercase;">Loading Environment</div>
        <div class="progress-text" id="load-progress">0%</div>
    </div>

    <!-- HUD 控制栏 -->
    <div id="hud-controls">
        <button class="hud-btn" id="btn-gallery" title="Scenes">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        </button>
        <div class="divider"></div>
        <button class="hud-btn" id="btn-planet" title="Planet Mode">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"></circle><ellipse cx="12" cy="12" rx="11" ry="3" transform="rotate(20 12 12)"></ellipse></svg>
        </button>
        <button class="hud-btn" id="btn-auto" title="Auto Rotate">
            <svg viewBox="0 0 24 24"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.26l5.08 5.08"></path></svg>
        </button>
        <div class="divider"></div>
        <button class="hud-btn" id="btn-fullscreen" title="Fullscreen">
            <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        </button>
    </div>

    <div id="gallery-panel"></div>
    <div id="toast-msg"><span id="toast-text"></span></div>

    <script>
        // --- 全景图数据源 (仅保留 5 个精选稳定的 Demo 场景) ---
        const SCENE_LIST = [
            { id: 0, name: "Donggang", url: "https://cllli.oss-cn-beijing.aliyuncs.com/img/panoramic/P1.jpg" },
            { id: 1, name: "Concept", url: "https://cllli.oss-cn-beijing.aliyuncs.com/img/panoramic/P4.jpg" },
            { id: 2, name: "Ice Valley", url: "https://cllli.oss-cn-beijing.aliyuncs.com/img/panoramic/P3.jpg" },
            { id: 3, name: "Zhongshan", url: "https://cllli.oss-cn-beijing.aliyuncs.com/img/panoramic/P2.jpg" },
            { id: 4, name: "Alma", url: "https://pannellum.org/images/alma.jpg" }
        ];

        // --- 核心变量 ---
        let currentSceneId = 0;
        let isVRActive = false;
        
        let scene, camera, renderer, material, textureLoader;
        
        // 视角与动画参数：初始配置为正视前方的大广角
        let lon = 0, lat = 0, fov = 140; 
        let targetLon = 0, targetLat = 0, targetFov = 140;
        
        let planetEffect = 0.0, targetPlanetEffect = 0.0; 
        
        let isUserInteracting = false;
        let onPointerDownPointerX = 0, onPointerDownPointerY = 0;
        let onPointerDownLon = 0, onPointerDownLat = 0;

        let isAutoRotating = false;
        let isPlanetMode = false;
        let idleTimer;

        const els = {
            startBtn: document.getElementById('startBtn'),
            landing: document.getElementById('landing-page'),
            landingBg: document.getElementById('landing-bg'),
            landingGallery: document.getElementById('landing-gallery'),
            loader: document.getElementById('loader'),
            progressText: document.getElementById('load-progress'),
            hud: document.getElementById('hud-controls'),
            galleryPanel: document.getElementById('gallery-panel'),
            toast: document.getElementById('toast-msg'),
            toastText: document.getElementById('toast-text'),
            webglContainer: document.getElementById('webgl-container'),
            interactionLayer: document.getElementById('interaction-layer'),
            transitionBox: document.getElementById('scene-transition')
        };

        // --- 初始化基础 UI ---
        function initUI() {
            els.landingBg.style.backgroundImage = `url('${SCENE_LIST[0].url}')`;
            renderGalleries();
        }

        function renderGalleries() {
            if (els.landingGallery.children.length === 0) {
                SCENE_LIST.forEach((sceneData, index) => {
                    const lItem = document.createElement('div');
                    lItem.className = `thumb-item ${index === currentSceneId ? 'active' : ''}`;
                    lItem.addEventListener('click', () => updateLandingSelection(index));
                    lItem.innerHTML = `
                        <img src="${sceneData.url}" loading="lazy">
                        <div class="item-title">${sceneData.name}</div>
                    `;
                    els.landingGallery.appendChild(lItem);

                    const hItem = document.createElement('div');
                    hItem.className = `hud-scene-item ${index === currentSceneId ? 'active' : ''}`;
                    hItem.addEventListener('click', () => switchVRScene(index));
                    hItem.innerHTML = `<img src="${sceneData.url}" loading="lazy"><div class="title">${sceneData.name}</div>`;
                    els.galleryPanel.appendChild(hItem);
                });
            } else {
                Array.from(els.landingGallery.children).forEach((el, idx) => el.classList.toggle('active', idx === currentSceneId));
                Array.from(els.galleryPanel.children).forEach((el, idx) => el.classList.toggle('active', idx === currentSceneId));
            }
        }

        function updateLandingSelection(index) {
            if (index === currentSceneId) return;
            currentSceneId = index;
            renderGalleries();
            els.landingBg.style.opacity = 0;
            setTimeout(() => {
                 els.landingBg.style.backgroundImage = `url('${SCENE_LIST[index].url}')`;
                 els.landingBg.style.opacity = 1;
            }, 300);
        }

        function showToast(text) {
            els.toastText.innerText = text;
            els.toast.classList.add('show');
            setTimeout(() => els.toast.classList.remove('show'), 3000);
        }

        // --- 核心：数学级完美无缝畸变的 GLSL Shader ---
        function initThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            
            const geometry = new THREE.PlaneGeometry(2, 2);
            
            material = new THREE.ShaderMaterial({
                uniforms: {
                    tEquirect: { value: null },
                    uFov: { value: THREE.MathUtils.degToRad(75) },
                    uAspect: { value: window.innerWidth / window.innerHeight },
                    uRotation: { value: new THREE.Vector2(0, 0) },
                    uPlanet: { value: 0.0 } 
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform sampler2D tEquirect;
                    uniform float uFov;
                    uniform float uAspect;
                    uniform vec2 uRotation;
                    uniform float uPlanet;

                    varying vec2 vUv;
                    const float PI = 3.14159265359;

                    vec3 rotateX(vec3 v, float angle) {
                        float s = sin(angle);
                        float c = cos(angle);
                        return vec3(v.x, c * v.y - s * v.z, s * v.y + c * v.z);
                    }

                    vec3 rotateY(vec3 v, float angle) {
                        float s = sin(angle);
                        float c = cos(angle);
                        return vec3(c * v.x - s * v.z, v.y, s * v.x + c * v.z);
                    }

                    void main() {
                        vec2 pUv = vUv * 2.0 - 1.0;
                        pUv.x *= uAspect;

                        float R = length(pUv);
                        
                        float param = 1.0 + uPlanet; 

                        float theta = 0.0;
                        if (R > 0.0001) {
                            float f = 1.0 / (param * tan(uFov / (2.0 * param)));
                            theta = param * atan(R / (param * f));
                        }

                        float phi_screen = atan(pUv.y, pUv.x);

                        vec3 ray = vec3(
                            sin(theta) * cos(phi_screen),
                            sin(theta) * sin(phi_screen),
                            -cos(theta)
                        );

                        ray = rotateX(ray, uRotation.y);
                        ray = rotateY(ray, uRotation.x);

                        float theta_tex = atan(ray.x, -ray.z);
                        float phi_tex = asin(clamp(ray.y, -1.0, 1.0));
                        vec2 texUv = vec2(0.5 + theta_tex / (2.0 * PI), 0.5 + phi_tex / PI);

                        gl_FragColor = texture2D(tEquirect, texUv);
                    }
                `
            });

            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            els.webglContainer.appendChild(renderer.domElement);

            textureLoader = new THREE.TextureLoader();
            textureLoader.setCrossOrigin('anonymous'); 

            animate();
            bindInteractionEvents();
            window.addEventListener('resize', onWindowResize);
        }

        function loadPanorama(url, isFirstLoad = false) {
            els.loader.style.display = 'flex';
            els.progressText.innerText = "0%";
            els.transitionBox.style.opacity = '1'; 

            textureLoader.load(
                url,
                (texture) => {
                    texture.generateMipmaps = false;
                    texture.minFilter = THREE.LinearFilter;
                    texture.magFilter = THREE.LinearFilter;
                    texture.wrapS = THREE.RepeatWrapping;
                    
                    material.uniforms.tEquirect.value = texture;

                    setTimeout(() => {
                        els.loader.style.display = 'none';
                        els.transitionBox.style.opacity = '0'; 
                        
                        if (isFirstLoad) {
                            els.landing.style.opacity = '0';
                            setTimeout(() => els.landing.style.display = 'none', 1200);
                            els.hud.classList.add('visible');
                            
                            // 电影级缓推入开场 (Cinematic Push-in)
                            setTimeout(() => {
                                targetLat = 0;
                                targetPlanetEffect = 0.0;
                                targetFov = window.innerWidth / window.innerHeight < 1 ? 95 : 75;
                                isAutoRotating = true; 
                                document.getElementById('btn-auto').classList.add('active');
                                document.getElementById('btn-auto').innerHTML = `<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`;
                            }, 400); 
                        }
                        
                        showToast(SCENE_LIST[currentSceneId].name);
                        resetIdleTimer();
                    }, 200);
                },
                (xhr) => {
                    if (xhr.lengthComputable) {
                        const percentComplete = Math.round((xhr.loaded / xhr.total) * 100);
                        els.progressText.innerText = percentComplete + '%';
                    }
                },
                (err) => {
                    els.loader.style.display = 'none';
                    showToast("LOAD FAILED");
                }
            );
        }

        function bindInteractionEvents() {
            const layer = els.interactionLayer;
            
            layer.addEventListener('mousedown', onPointerDown);
            layer.addEventListener('touchstart', (e) => onPointerDown(e.touches[0]), { passive: false });
            
            window.addEventListener('mousemove', onPointerMove);
            window.addEventListener('touchmove', (e) => onPointerMove(e.touches[0]), { passive: false });
            
            window.addEventListener('mouseup', onPointerUp);
            window.addEventListener('touchend', onPointerUp);
            
            layer.addEventListener('wheel', (e) => {
                targetFov += e.deltaY * 0.05;
                if (isPlanetMode) {
                    targetFov = Math.max(150, Math.min(340, targetFov));
                } else {
                    targetFov = Math.max(30, Math.min(140, targetFov));
                }
                resetIdleTimer();
            }, { passive: true });
        }

        function onPointerDown(event) {
            isUserInteracting = true;
            onPointerDownPointerX = event.clientX;
            onPointerDownPointerY = event.clientY;
            onPointerDownLon = lon;
            onPointerDownLat = lat;
            
            if (isAutoRotating) {
                isAutoRotating = false;
                document.getElementById('btn-auto').classList.remove('active');
                document.getElementById('btn-auto').innerHTML = `<svg viewBox="0 0 24 24"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.26l5.08 5.08"></path></svg>`;
            }
            resetIdleTimer();
        }

        function onPointerMove(event) {
            if (isUserInteracting) {
                const sensitivity = (fov / 75) * 0.1;
                targetLon = (onPointerDownPointerX - event.clientX) * sensitivity + onPointerDownLon;
                targetLat = (event.clientY - onPointerDownPointerY) * sensitivity + onPointerDownLat;
                resetIdleTimer();
            }
        }

        function onPointerUp() { isUserInteracting = false; }

        function onWindowResize() {
            if (!renderer) return;
            renderer.setSize(window.innerWidth, window.innerHeight);
            const aspect = window.innerWidth / window.innerHeight;
            material.uniforms.uAspect.value = aspect;
            if(!isPlanetMode) {
                targetFov = aspect < 1 ? 95 : 75; 
            } else {
                targetFov = aspect < 1 ? 300 : 260; // 窗口改变时动态调整星球模式FOV
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!isVRActive) return;

            if (isAutoRotating && !isUserInteracting) {
                targetLon += 0.08;
            }

            targetLat = Math.max(-90, Math.min(90, targetLat));

            lon += (targetLon - lon) * 0.05;
            lat += (targetLat - lat) * 0.05;
            fov += (targetFov - fov) * 0.04;
            planetEffect += (targetPlanetEffect - planetEffect) * 0.04;

            material.uniforms.uFov.value = THREE.MathUtils.degToRad(fov);
            material.uniforms.uRotation.value.set(
                THREE.MathUtils.degToRad(lon), 
                THREE.MathUtils.degToRad(lat)
            );
            material.uniforms.uPlanet.value = planetEffect;

            renderer.render(scene, camera);
        }

        els.startBtn.addEventListener('click', async () => {
            try { if (!document.fullscreenElement && document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen(); } catch(e) {}
            els.landing.style.backdropFilter = 'blur(0px)';
            document.querySelector('.landing-content').style.opacity = '0';
            
            if (!scene) initThreeJS();
            isVRActive = true;
            loadPanorama(SCENE_LIST[currentSceneId].url, true);
        });

        function switchVRScene(index) {
            if (index === currentSceneId) { toggleGalleryPanel(); return; }
            currentSceneId = index;
            toggleGalleryPanel(); 
            renderGalleries(); 
            if (isPlanetMode) togglePlanetMode(); 
            loadPanorama(SCENE_LIST[index].url, false);
        }

        function toggleGalleryPanel() {
            els.galleryPanel.classList.toggle('open');
            document.getElementById('btn-gallery').classList.toggle('active');
            resetIdleTimer();
        }
        document.getElementById('btn-gallery').addEventListener('click', (e) => { e.stopPropagation(); toggleGalleryPanel(); });

        function togglePlanetMode() {
            isPlanetMode = !isPlanetMode;
            document.getElementById('btn-planet').classList.toggle('active', isPlanetMode);
            const aspect = window.innerWidth / window.innerHeight;
            
            if (isPlanetMode) {
                targetPlanetEffect = 1.0; 
                targetLat = -90;          
                // 移动端 (竖屏) 拉远 FOV 至 300，桌面端保持 260，以保证星球完整显示
                targetFov = aspect < 1 ? 300 : 260;          
                if(!isAutoRotating) document.getElementById('btn-auto').click(); 
                showToast("PLANET MODE");
            } else {
                targetPlanetEffect = 0.0; 
                targetLat = 0;
                targetFov = aspect < 1 ? 95 : 75;
                showToast("NORMAL MODE");
            }
            resetIdleTimer();
        }
        document.getElementById('btn-planet').addEventListener('click', togglePlanetMode);

        document.getElementById('btn-auto').addEventListener('click', () => {
            isAutoRotating = !isAutoRotating;
            const btn = document.getElementById('btn-auto');
            if (isAutoRotating) {
                btn.classList.add('active');
                btn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`;
            } else {
                btn.classList.remove('active');
                btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.26l5.08 5.08"></path></svg>`;
            }
            resetIdleTimer();
        });

        document.getElementById('btn-fullscreen').addEventListener('click', async () => {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                try { if(document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen(); } catch(e){}
            } else {
                try { if(document.exitFullscreen) await document.exitFullscreen(); } catch(e){}
            }
            resetIdleTimer();
        });

        els.interactionLayer.addEventListener('click', (e) => {
            if (els.galleryPanel.classList.contains('open')) toggleGalleryPanel();
            resetIdleTimer();
        });

        function resetIdleTimer() {
            clearTimeout(idleTimer);
            els.hud.classList.remove('idle');
            idleTimer = setTimeout(() => {
                if (!els.galleryPanel.classList.contains('open') && isVRActive) els.hud.classList.add('idle');
            }, 3000);
        }

        initUI();

    </script>
</body>
</html>
